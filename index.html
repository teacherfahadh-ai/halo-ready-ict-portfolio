<title>Jamal Fahadh | ICT Portfolio</title>

:root {
  --primary:#0a2540;
  --accent:#ff6b00;
  --bg:#f4f6f8;
}

body {
  margin:0;
  font-family: Arial, sans-serif;
  background:var(--bg);
  color:#333;
}

/* NAVBAR */
nav {
  background:var(--primary);
  color:white;
  padding:15px;
  text-align:center;
  position:sticky;
  top:0;
}

/* HERO */
header {
  background:linear-gradient(rgba(10,37,64,0.9), rgba(10,37,64,0.9)),
  url('https://images.unsplash.com/photo-1526378722443-4f9c1c6c5e5b');
  background-size:cover;
  color:white;
  text-align:center;
  padding:60px 20px;
}

header img {
  width:120px;
  border-radius:50%;
  border:3px solid white;
}

header h1 {
  margin:10px 0 5px;
}

/* SECTIONS */
section {
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.card {
  background:white;
  margin:20px 0;
  padding:20px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

@media(max-width:768px){
  .grid { grid-template-columns:1fr; }
}

/* BUTTON */
.btn {
  display:inline-block;
  background:var(--accent);
  color:white;
  padding:10px 15px;
  border-radius:6px;
  text-decoration:none;
  margin-top:10px;
}
