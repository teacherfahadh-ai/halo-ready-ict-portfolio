<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jamal Fahadh | ICT & IM Specialist</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: #0b0f14;
    color: #e6edf3;
    line-height: 1.6;
}

.container {
    width: 90%;
    max-width: 1100px;
    margin: auto;
}

header {
    height: 100vh;
    display: flex;
    align-items: center;
    background: linear-gradient(to bottom right, #0b0f14, #111927);
}

.hero {
    max-width: 700px;
}

.hero h1 {
    font-size: 3rem;
    font-weight: 700;
}

.hero h1 span {
    color: #3b82f6;
}

.hero p {
    margin: 20px 0;
    color: #9ca3af;
    font-size: 1.1rem;
}

.btn {
    display: inline-block;
    padding: 12px 24px;
    background: #3b82f6;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    margin-top: 10px;
    transition: 0.3s;
}

.btn:hover {
    background: #2563eb;
}

section {
    padding: 80px 0;
}

h2 {
    font-size: 2rem;
    margin-bottom: 30px;
}

.card {
    background: #111927;
    padding: 25px;
    border-radius: 10px;
    margin-bottom: 20px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    background: #162032;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.tag {
    display: inline-block;
    background: #1f2937;
    padding: 6px 12px;
    margin: 5px;
    border-radius: 5px;
    font-size: 0.85rem;
}

footer {
    text-align: center;
    padding: 40px;
    background: #111927;
    color: #9ca3af;
}
</style>
</head>

<body>

<header>
<div class="container">
<div class="hero">
<h1>Jamal Fahadh <span>Mohamed</span></h1>
<p>ICT Specialist | Information Management | Field-Ready Systems Engineer</p>
